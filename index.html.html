<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沐程先生 · 今日问候</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--c:#00f5ff;--m:#ff00cc;--g:#39ff14;--y:#ffe600;--bg:#04040e}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;overflow-x:hidden}
body{background:var(--bg);color:#dde8ff;font-family:'Noto Sans SC',sans-serif}
.grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,245,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.04) 1px,transparent 1px);background-size:55px 55px}
.scan{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px)}
#cv{position:fixed;inset:0;z-index:0}

/* start overlay */
#start{position:fixed;inset:0;z-index:999;background:rgba(4,4,14,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer;transition:opacity .6s}
#start.gone{opacity:0;pointer-events:none}
.ring{width:110px;height:110px;border-radius:50%;border:1.5px solid var(--c);display:flex;align-items:center;justify-content:center;animation:pulse-ring 2.2s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(0,245,255,.45)}50%{box-shadow:0 0 0 22px rgba(0,245,255,0)}}
.start-label{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:5px;color:var(--c)}
.start-hint{font-size:11px;letter-spacing:3px;color:rgba(200,220,255,.35);margin-top:4px}

/* layout */
.wrap{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 70px}

/* header */
.hdr{text-align:center;margin-bottom:36px;opacity:0;animation:fadeup 1s ease forwards .4s}
.hdr-tag{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:6px;color:var(--c);opacity:.6;margin-bottom:12px}
.hdr-name{font-family:'Orbitron',monospace;font-size:clamp(30px,6vw,62px);font-weight:900;letter-spacing:4px;background:linear-gradient(120deg,var(--c) 0%,var(--m) 50%,var(--y) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 22px rgba(0,245,255,.5))}
.hdr-sub{font-size:12px;letter-spacing:4px;color:rgba(200,220,255,.4);margin-top:6px}

/* date */
.date-blk{text-align:center;margin-bottom:32px;opacity:0;transition:opacity .8s}
.date-blk.on{opacity:1}
.date-lbl{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:5px;color:var(--c);opacity:.55;margin-bottom:10px}
.date-txt{font-size:clamp(20px,3.5vw,40px);font-weight:700;letter-spacing:2px;color:#fff;text-shadow:0 0 18px var(--c),0 0 50px rgba(0,245,255,.25)}
.date-txt span{display:inline-block;opacity:0;transform:translateY(16px);transition:opacity .35s,transform .35s}
.date-txt span.show{opacity:1;transform:translateY(0)}

/* tags */
.tags{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:42px;opacity:0;transition:opacity .6s}
.tags.on{opacity:1}
.tags.fade{opacity:0;pointer-events:none}
.tag{padding:7px 18px;font-size:12px;letter-spacing:2px;border:1px solid rgba(0,245,255,.2);border-radius:3px;background:rgba(0,245,255,.04);color:rgba(200,225,255,.6);position:relative;overflow:hidden}
.tag::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.tag:nth-child(1)::before{background:var(--c)}.tag:nth-child(2)::before{background:var(--g)}.tag:nth-child(3)::before{background:var(--m)}

/* energy button */
#energyBtn{position:relative;margin-bottom:0;opacity:0;transform:scale(.88);transition:opacity .7s,transform .7s;cursor:pointer;border:none;background:none;padding:0}
#energyBtn.on{opacity:1;transform:scale(1)}
#energyBtn.gone{opacity:0;transform:scale(1.1) translateY(-6px);pointer-events:none;transition:opacity .4s,transform .4s}
.e-outer-ring{padding:2.5px;border-radius:54px;background:conic-gradient(from 0deg,#00f5ff,#ff00cc,#ffe600,#39ff14,#00f5ff);box-shadow:0 0 18px rgba(0,245,255,.35),0 0 40px rgba(255,0,204,.2);animation:hue-spin 3s linear infinite}
@keyframes hue-spin{to{filter:hue-rotate(360deg)}}
.e-inner{padding:18px 52px;border-radius:52px;background:#04040e;display:flex;align-items:center;gap:14px;transition:background .25s}
#energyBtn:hover .e-inner{background:#0c0c1e}
#energyBtn:active .e-inner{background:#111128}
.e-orb{width:20px;height:20px;border-radius:50%;position:relative;flex-shrink:0}
.e-orb::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,#fff 0%,var(--y) 35%,var(--m) 70%,transparent 100%);animation:orb-pulse 1.6s ease-in-out infinite}
@keyframes orb-pulse{0%,100%{transform:scale(.6);opacity:.7}50%{transform:scale(.95);opacity:1}}
.e-text{font-family:'Noto Sans SC',sans-serif;font-size:17px;font-weight:700;letter-spacing:3px;white-space:nowrap;background:linear-gradient(90deg,var(--c),var(--m),var(--y),var(--c));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:text-flow 2.5s linear infinite}
@keyframes text-flow{0%{background-position:0%}100%{background-position:200%}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.2);transform:scale(0);animation:rip .65s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:scale(4.5);opacity:0}}

/* ── charge area: replaces button space, no overlap ── */
#chargeArea{
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  margin-bottom:0;
}
#chargeArea.on{display:flex}
.cr-svg{overflow:visible}
.cr-track{fill:none;stroke:rgba(0,245,255,.1);stroke-width:5}
.cr-fill{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:0 402;filter:drop-shadow(0 0 8px var(--c))}
.cr-pct{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;fill:var(--c);text-anchor:middle;dominant-baseline:middle}
.cr-status{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:5px;color:var(--c);animation:flicker 1.3s ease-in-out infinite}
@keyframes flicker{0%,100%{opacity:.65}50%{opacity:1}}

/* blessing */
.bless-blk{max-width:580px;text-align:center;margin-bottom:44px;margin-top:44px;opacity:0;transition:opacity .8s}
.bless-blk.on{opacity:1}
.bless-lbl{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:5px;color:var(--m);opacity:.65;margin-bottom:14px}
.bless-card{border:1px solid rgba(255,0,204,.3);border-radius:8px;padding:26px 30px;background:linear-gradient(135deg,rgba(255,0,204,.05),rgba(0,245,255,.05));position:relative;overflow:hidden}
.bless-card::after{content:'';position:absolute;top:0;left:-110%;width:110%;height:2px;background:linear-gradient(90deg,transparent,var(--m),transparent);animation:scan-bar 3.5s linear infinite}
@keyframes scan-bar{0%{left:-110%}100%{left:200%}}
.bless-txt{font-size:clamp(15px,2.2vw,20px);font-weight:300;line-height:1.9;color:#e8eeff;letter-spacing:.5px}
.cursor{display:inline-block;width:2px;height:1.1em;background:var(--m);vertical-align:middle;animation:blink .65s step-end infinite}
@keyframes blink{50%{opacity:0}}


/* cute tech sticker after blessing */
.sticker-blk{margin-top:-18px;opacity:0;transform:translateY(22px) scale(.94);transition:opacity .65s ease,transform .65s ease;pointer-events:none}
.sticker-blk.on{opacity:1;transform:translateY(0) scale(1)}
.sticker-inner{display:flex;align-items:center;justify-content:center;gap:18px;position:relative}
.mascot{width:118px;height:116px;position:relative;animation:bot-float 2.8s ease-in-out infinite;filter:drop-shadow(0 0 18px rgba(0,245,255,.35))}
@keyframes bot-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.antenna{position:absolute;left:56px;top:0;width:2px;height:22px;background:var(--c);box-shadow:0 0 10px var(--c)}
.antenna::after{content:'';position:absolute;left:-5px;top:-8px;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle,#fff,var(--y) 40%,var(--m));box-shadow:0 0 16px var(--m)}
.bot-head{position:absolute;left:18px;top:22px;width:82px;height:64px;border:1.5px solid rgba(0,245,255,.7);border-radius:22px;background:linear-gradient(135deg,rgba(0,245,255,.16),rgba(255,0,204,.12));box-shadow:inset 0 0 24px rgba(0,245,255,.12),0 0 24px rgba(255,0,204,.14)}
.bot-head::before,.bot-head::after{content:'';position:absolute;top:-12px;width:18px;height:18px;border:1.5px solid rgba(0,245,255,.65);background:#070719;transform:rotate(45deg);box-shadow:0 0 12px rgba(0,245,255,.35)}
.bot-head::before{left:10px}.bot-head::after{right:10px}
.eye{position:absolute;top:24px;width:13px;height:13px;border-radius:50%;background:var(--c);box-shadow:0 0 14px var(--c);animation:eye-blink 3.4s infinite}
.eye.l{left:22px}.eye.r{right:22px}
@keyframes eye-blink{0%,90%,100%{transform:scaleY(1)}94%{transform:scaleY(.12)}}
.mouth{position:absolute;left:35px;top:42px;width:14px;height:7px;border-bottom:2px solid var(--y);border-radius:0 0 14px 14px;filter:drop-shadow(0 0 7px var(--y))}
.bot-body{position:absolute;left:34px;top:82px;width:50px;height:28px;border:1.5px solid rgba(57,255,20,.7);border-radius:14px;background:rgba(57,255,20,.08);box-shadow:0 0 18px rgba(57,255,20,.18)}
.bot-body::before{content:'100%';position:absolute;left:0;right:0;top:6px;text-align:center;font-family:'Orbitron',monospace;font-size:10px;color:var(--g);letter-spacing:1px}
.arm{position:absolute;top:86px;width:26px;height:12px;border-top:2px solid var(--c);filter:drop-shadow(0 0 8px var(--c))}
.arm.l{left:10px;transform-origin:right center;animation:wave-left 1.1s ease-in-out infinite}.arm.r{right:10px;transform-origin:left center;animation:wave-right 1.1s ease-in-out infinite .18s}
@keyframes wave-left{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(-44deg)}}
@keyframes wave-right{0%,100%{transform:rotate(18deg)}50%{transform:rotate(44deg)}}
.sticker-bubble{max-width:330px;border:1px solid rgba(0,245,255,.28);border-radius:16px;padding:14px 18px;background:linear-gradient(135deg,rgba(0,245,255,.08),rgba(255,0,204,.08));color:#f4f7ff;font-size:14px;line-height:1.65;letter-spacing:.8px;box-shadow:0 0 22px rgba(0,245,255,.1);position:relative}
.sticker-bubble::before{content:'';position:absolute;left:-8px;top:36px;width:14px;height:14px;background:#090916;border-left:1px solid rgba(0,245,255,.28);border-bottom:1px solid rgba(0,245,255,.28);transform:rotate(45deg)}
.sparkle{position:absolute;font-family:'Orbitron',monospace;color:var(--y);text-shadow:0 0 12px var(--y);animation:spark-pop 1.8s ease-in-out infinite}
.sparkle.s1{left:8%;top:8%;animation-delay:0s}.sparkle.s2{right:10%;top:2%;color:var(--c);text-shadow:0 0 12px var(--c);animation-delay:.35s}.sparkle.s3{right:20%;bottom:8%;color:var(--m);text-shadow:0 0 12px var(--m);animation-delay:.7s}
@keyframes spark-pop{0%,100%{opacity:.35;transform:scale(.72) rotate(0)}50%{opacity:1;transform:scale(1.15) rotate(12deg)}}
@media (max-width:640px){.sticker-inner{flex-direction:column;gap:10px}.sticker-bubble::before{display:none}.sticker-bubble{font-size:13px}}

/* sound indicator */
#si{position:fixed;top:18px;right:20px;z-index:500;display:none;align-items:center;gap:8px;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:var(--c);opacity:.8}
#si.on{display:flex}
.bars{display:flex;gap:3px;align-items:flex-end;height:18px}
.bar{width:3px;background:var(--c);border-radius:1px;animation:bar-a .55s ease-in-out infinite alternate}
.bar:nth-child(1){height:5px;animation-delay:0s}.bar:nth-child(2){height:12px;animation-delay:.1s}.bar:nth-child(3){height:18px;animation-delay:.2s}.bar:nth-child(4){height:10px;animation-delay:.14s}.bar:nth-child(5){height:5px;animation-delay:.04s}
@keyframes bar-a{from{transform:scaleY(.25)}to{transform:scaleY(1)}}

.foot{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:rgba(200,220,255,.2);white-space:nowrap;z-index:10}
@keyframes fadeup{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="grid"></div><div class="scan"></div><canvas id="cv"></canvas>

<div id="start" onclick="boot()">
  <div class="ring"><svg width="28" height="28" viewBox="0 0 28 28"><polygon points="9,5 23,14 9,23" fill="#00f5ff"/></svg></div>
  <div class="start-label">开启今日问候</div>
  <div class="start-hint">点击任意处继续</div>
</div>

<div id="si"><div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>AUDIO</div>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-tag">// DAILY GREETING SYSTEM · ONLINE</div>
    <div class="hdr-name">沐程先生</div>
    <div class="hdr-sub">专属 · 每日问候 · EXCLUSIVE</div>
  </div>

  <div class="date-blk" id="db">
    <div class="date-lbl">// TODAY · 今日</div>
    <div class="date-txt" id="dt"></div>
  </div>

  <!-- tags fade out when charging starts -->
  <div class="tags" id="tags">
    <div class="tag">⚡ 项目开发</div>
    <div class="tag">💪 健身</div>
    <div class="tag">📡 抖音直播</div>
  </div>

  <!-- button and charge ring share the same vertical slot -->
  <button id="energyBtn" onclick="chargeUp(event)">
    <div class="e-outer-ring">
      <div class="e-inner">
        <div class="e-orb"></div>
        <span class="e-text">今日能量已加满</span>
        <div class="e-orb"></div>
      </div>
    </div>
  </button>

  <!-- charge ring appears in same position after button gone -->
  <div id="chargeArea">
    <svg class="cr-svg" width="160" height="160" viewBox="-80 -80 160 160">
      <circle class="cr-track" r="64"/>
      <circle class="cr-fill" id="crFill" r="64" transform="rotate(-90)" stroke="#00f5ff"/>
      <text class="cr-pct" id="crPct" x="0" y="0" fill="#00f5ff">0%</text>
    </svg>
    <div class="cr-status" id="crStatus">CHARGING</div>
  </div>

  <div class="bless-blk" id="bb">
    <div class="bless-lbl">// TODAY'S SIGNAL · 今日加持</div>
    <div class="bless-card"><div class="bless-txt" id="bt"><span class="cursor"></span></div></div>
  </div>

  <div class="sticker-blk" id="sticker" aria-hidden="true">
    <div class="sticker-inner">
      <span class="sparkle s1">✦</span>
      <span class="sparkle s2">✧</span>
      <span class="sparkle s3">◆</span>
      <div class="mascot">
        <div class="antenna"></div>
        <div class="bot-head">
          <span class="eye l"></span>
          <span class="eye r"></span>
          <span class="mouth"></span>
        </div>
        <div class="arm l"></div>
        <div class="arm r"></div>
        <div class="bot-body"></div>
      </div>
      <div class="sticker-bubble" id="stickerText">能量小助手上线：今日状态，满格发光！</div>
    </div>
  </div>
</div>

<div class="foot">SYSTEM · ACTIVE · <span id="clk"></span></div>

<script>
const BLESSINGS=[
  "代码是你的画布，每一行都是作品。愿今天的项目顺风顺水，bug 一键清零。",
  "铁要烧红才能锻造，代码要跑通才算完成。今天挥汗与敲键，都是在书写自己的传奇。",
  "直播间里你是主角，健身房里你是王者，项目里你是架构师。三界无敌，沐程风采。",
  "愿你今天写下的每一个函数都优雅简洁，举起的每一块铁都精准有力，直播的每一帧都光彩照人。",
  "项目推进中遇到的每道难题，都是系统在给你升级的机会。今天也继续满状态输出吧！",
  "晨跑给你清醒，代码给你成就，直播给你连接。三件事做好，今天就是完整的一天。",
  "程序员的浪漫是把混乱需求变成优雅系统；健身者的意志是把肌肉酸痛变成力量增长。你两者兼具，今天也加油！",
  "生活需要版本迭代，成长需要不断 commit。愿今天的你比昨天更强，比明天更轻松。",
  "代码跑过千行，铁板撑起体魄，声音穿透屏幕。沐程先生今天也是三栖冠军。",
  "把健身的专注带进代码，把直播的热情注入生活，把项目的严谨应用到每件事。今日也是全力以赴的一天！",
  "每次 push 都是成长，每组深蹲都是意志，每次直播都是连接。今天的你，三重进化中。",
  "愿你的服务器永不宕机，肌肉永不延迟，直播间永远在线。技术·体能·热爱，今日三满格。",
];
const WD=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];


/* ── particles ── */
(function(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  let W=cv.width=innerWidth,H=cv.height=innerHeight;
  const cols=['#00f5ff','#ff00cc','#39ff14','#ffe600'];
  const pts=Array.from({length:55},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*1.4+.4,a:Math.random()*.45+.1,c:cols[Math.floor(Math.random()*4)]}));
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.globalAlpha=p.a;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;});
    ctx.globalAlpha=1;
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<115){ctx.beginPath();ctx.strokeStyle='#00f5ff';ctx.globalAlpha=(1-d/115)*.07;ctx.lineWidth=.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}
    requestAnimationFrame(draw);
  }
  draw();
  addEventListener('resize',()=>{W=cv.width=innerWidth;H=cv.height=innerHeight});
})();

/* clock */
function tick(){const n=new Date();document.getElementById('clk').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');}
setInterval(tick,1000);tick();

/* audio */
let ACTX=null;
function ac(){return ACTX||(ACTX=new(window.AudioContext||window.webkitAudioContext)())}

/* create a simple reverb convolver from noise impulse */
function makeReverb(a,dur=1.8,decay=2.5){
  const rate=a.sampleRate,len=rate*dur,buf=a.createBuffer(2,len,rate);
  for(let c=0;c<2;c++){const ch=buf.getChannelData(c);for(let i=0;i<len;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  const conv=a.createConvolver();conv.buffer=buf;return conv;
}

/* opening chime */
function playChime(){
  const a=ac(),now=a.currentTime;
  [[523.25,0],[659.25,.5],[783.99,1],[1046.5,1.6],[880,2.2],[783.99,2.7],[1046.5,3.3],[880,3.8],[1046.5,4.3]].forEach(([f,t])=>{
    const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=f;
    const lfo=a.createOscillator(),lg=a.createGain();lfo.connect(lg);lg.connect(o.detune);lfo.frequency.value=4.8;lg.gain.value=9;
    const s=now+t;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(.11,s+.06);g.gain.exponentialRampToValueAtTime(.001,s+.85);
    lfo.start(s);lfo.stop(s+.85);o.start(s);o.stop(s+.85);
  });
}

/* ── energy sound: "Crystal Charge" ── */
function playEnergy(){
  const a=ac(),now=a.currentTime;

  /* shared reverb bus */
  const rev=makeReverb(a,2.2,2.8);
  const revG=a.createGain();rev.connect(revG);revG.connect(a.destination);revG.gain.value=.28;

  /* helper: route osc to dry + reverb */
  function tone(freq,start,dur,peak,type='sine',detuneHz=0){
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);g.connect(rev);
    o.type=type;o.frequency.value=freq;
    if(detuneHz)o.detune.value=detuneHz*100;
    g.gain.setValueAtTime(0,now+start);
    g.gain.linearRampToValueAtTime(peak,now+start+.06);
    g.gain.exponentialRampToValueAtTime(.0001,now+start+dur);
    o.start(now+start);o.stop(now+start+dur+.05);
  }

  /* 1 — warm bass pad: sine drone building slowly */
  tone(65.4,0,4.8,.04);      /* C2 */
  tone(130.8,.15,4.6,.05);   /* C3 */
  tone(196,.4,4.2,.03);      /* G3 */

  /* 2 — pentatonic ascending melody (C major penta) with soft attack */
  /* C4 E4 G4 C5 E5 G5 C6 E6 */
  [[261.6,.3],[329.6,.68],[392,1.06],[523.25,1.44],[659.25,1.82],[783.99,2.2],[1046.5,2.58],[1318.5,2.96]].forEach(([f,t])=>{
    tone(f,t,.9,.07,'sine');
    tone(f*1.003,t+.01,.88,.025,'sine');   /* slight chorus */
  });

  /* 3 — shimmer: triangle sweep as magic dust */
  const shim=a.createOscillator(),sg=a.createGain();
  shim.connect(sg);sg.connect(rev);sg.connect(a.destination);
  shim.type='triangle';
  shim.frequency.setValueAtTime(220,now+.5);
  shim.frequency.exponentialRampToValueAtTime(3520,now+3.6);
  sg.gain.setValueAtTime(0,now+.5);
  sg.gain.linearRampToValueAtTime(.025,now+1.2);
  sg.gain.linearRampToValueAtTime(.03,now+3.0);
  sg.gain.linearRampToValueAtTime(0,now+4.0);
  shim.start(now+.5);shim.stop(now+4.1);

  /* 4 — final bloom: full pentatonic chord at 3.4s */
  [[261.6,0],[329.6,.003],[392,.006],[523.25,.009],[659.25,.012],[783.99,.015]].forEach(([f,dt])=>{
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);g.connect(rev);
    o.type='sine';o.frequency.value=f*(1+dt);
    g.gain.setValueAtTime(0,now+3.4);
    g.gain.linearRampToValueAtTime(.09-.015*dt*100,now+3.5);
    g.gain.exponentialRampToValueAtTime(.0001,now+5.5);
    o.start(now+3.4);o.stop(now+5.6);
  });

  /* 5 — high crystal bell at peak */
  tone(2093,3.5,.7,.06,'sine');
  tone(2637,3.62,.5,.04,'sine');
  tone(3136,3.74,.4,.03,'sine');
}

/* helpers */
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function dateStr(){const n=new Date();return `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日\u3000${WD[n.getDay()]}`;}
function revealDate(text){
  const el=document.getElementById('dt');el.innerHTML='';
  [...text].forEach(ch=>{const s=document.createElement('span');s.textContent=ch===' '?'\u00A0\u00A0':ch;el.appendChild(s);});
  el.querySelectorAll('span').forEach((s,i)=>setTimeout(()=>s.classList.add('show'),i*110));
}


function showSticker(){
  const lines=[
    '能量小助手上线：今日状态，满格发光！',
    '叮！项目推进 +1，肌肉能量 +1，直播魅力 +100。',
    '今日系统提示：别太低调，你已经开始发光了。',
    '沐程先生专属 Buff 已生效：稳、准、强、会发光。',
    '小机器人已检测：今天适合突破，也适合被夸。'
  ];
  const sticker=document.getElementById('sticker');
  const text=document.getElementById('stickerText');
  text.textContent=lines[Math.floor(Math.random()*lines.length)];
  sticker.classList.add('on');
}

function typewrite(el,txt,spd=62){
  return new Promise(res=>{
    el.innerHTML='<span class="cursor"></span>';let i=0;const cur=el.querySelector('.cursor');
    const ti=setInterval(()=>{if(i<txt.length){const sp=document.createElement('span');sp.textContent=txt[i++];el.insertBefore(sp,cur);}else{clearInterval(ti);setTimeout(()=>{cur.remove();res();},400);}},spd);
  });
}

/* charge ring — inline, no overlap */
function animateRing(durationMs){
  const fill=document.getElementById('crFill');
  const pct=document.getElementById('crPct');
  const status=document.getElementById('crStatus');
  const CIRC=2*Math.PI*64;
  fill.style.strokeDasharray='0 '+CIRC;

  const phases=[
    {at:0,   stroke:'#00f5ff',label:'CHARGING'},
    {at:.28, stroke:'#39ff14',label:'LOADING'},
    {at:.52, stroke:'#ffe600',label:'BOOSTING'},
    {at:.76, stroke:'#ff00cc',label:'SYNCING'},
    {at:.92, stroke:'#00f5ff',label:'ONLINE ✦'},
  ];
  const start=performance.now();let lastPi=-1;
  function step(now){
    const p=Math.min((now-start)/durationMs,1);
    fill.style.strokeDasharray=(p*CIRC)+' '+CIRC;
    pct.textContent=Math.round(p*100)+'%';
    pct.style.fill=fill.style.stroke||'#00f5ff';
    const pi=phases.reduce((a,ph,i)=>p>=ph.at?i:a,-1);
    if(pi!==lastPi&&pi>=0){
      lastPi=pi;
      fill.style.stroke=phases[pi].stroke;
      status.style.color=phases[pi].stroke;
      status.textContent=phases[pi].label;
    }
    if(p<1)requestAnimationFrame(step);
    else{pct.textContent='100%';status.textContent='READY  ⚡';setTimeout(()=>document.getElementById('chargeArea').classList.remove('on'),500);}
  }
  requestAnimationFrame(step);
}

/* ripple */
function addRipple(btn,e){
  const r=document.createElement('div');r.className='ripple';
  const rect=btn.getBoundingClientRect(),size=Math.max(rect.width,rect.height)*1.6;
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.appendChild(r);setTimeout(()=>r.remove(),700);
}

/* energy button click */
let charged=false;
async function chargeUp(e){
  if(charged)return;charged=true;
  const btn=document.getElementById('energyBtn');
  addRipple(btn,e);
  await wait(120);

  /* fade tags out, swap button for ring — no positional overlap */
  document.getElementById('tags').classList.add('fade');
  btn.classList.add('gone');
  await wait(350);
  document.getElementById('chargeArea').classList.add('on');

  const DUR=4600;
  playEnergy();
  animateRing(DUR);
  await wait(DUR+600);

  /* blessing */
  document.getElementById('bb').classList.add('on');
  const pick=BLESSINGS[Math.floor(Math.random()*BLESSINGS.length)];
  await typewrite(document.getElementById('bt'),pick,60);
  await wait(420);
  showSticker();
}

/* boot */
let booted=false;
async function boot(){
  if(booted)return;booted=true;
  document.getElementById('start').classList.add('gone');
  ac();
  const si=document.getElementById('si');si.classList.add('on');
  playChime();
  await wait(5200);
  si.classList.remove('on');
  document.getElementById('db').classList.add('on');
  revealDate(dateStr());
  await wait(1800);
  document.getElementById('tags').classList.add('on');
  await wait(900);
  document.getElementById('energyBtn').classList.add('on');
}
